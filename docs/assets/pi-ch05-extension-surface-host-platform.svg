<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="620" rx="32" fill="#0B1020"/>
  <rect x="40" y="40" width="1200" height="540" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="96" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">pi extension surface：agent 产品从功能集合变成宿主平台</text>
  <text x="80" y="132" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">当 tool、UI、provider、compaction、session lifecycle 都能外化，pi 的卖点就不再是单点功能。</text>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10 Z" fill="#38BDF8"/></marker>
  </defs>

  <rect x="96" y="218" width="270" height="212" rx="24" fill="#1E293B" stroke="#38BDF8" stroke-width="2" filter="url(#shadow)"/>
  <text x="128" y="264" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">核心 agent runtime</text>
  <text x="128" y="304" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">session tree</text>
  <text x="128" y="336" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">agent loop</text>
  <text x="128" y="368" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">base tools / model</text>
  <text x="128" y="400" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">提供最小但强的底座</text>

  <rect x="474" y="178" width="332" height="300" rx="28" fill="#172554" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <text x="506" y="226" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">extension runtime surface</text>
  <text x="506" y="270" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">registerTool / setActiveTools</text>
  <text x="506" y="304" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">commands / flags / shortcuts</text>
  <text x="506" y="338" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">UI / widget / renderer / editor</text>
  <text x="506" y="372" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">appendEntry / session hooks</text>
  <text x="506" y="406" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">registerProvider / compaction hooks</text>
  <text x="506" y="444" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">不是插件点，而是 runtime interface</text>

  <rect x="910" y="156" width="260" height="112" rx="20" fill="#052E16" stroke="#34D399" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="202" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">高级工作流</text>
  <text x="940" y="238" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="16">subagent / plan mode</text>

  <rect x="910" y="310" width="260" height="112" rx="20" fill="#312E81" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="356" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">可替换基础设施</text>
  <text x="940" y="392" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">provider / compaction / UI</text>

  <path d="M366 324 C410 324 430 324 474 324" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="392" y="302" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="15">expose</text>
  <path d="M806 270 C850 238 872 214 910 212" stroke="#34D399" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M806 382 C850 382 874 368 910 366" stroke="#A78BFA" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="132" y="514" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">核心判断：pi 的价值不是“功能最多”，而是让系统型用户在宿主 surface 上继续长工作流。</text>
</svg>
