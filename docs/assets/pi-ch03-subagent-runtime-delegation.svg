<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="760" rx="32" fill="#0B1020"/>
  <rect x="40" y="40" width="1200" height="680" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>

  <text x="80" y="96" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">pi subagent：不是 prompt 分身，而是 runtime 委派</text>
  <text x="80" y="132" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">extension 不在主上下文里模拟多个角色，而是 spawn 独立 pi 进程，并消费结构化事件流。</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#38BDF8"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#A78BFA"/>
    </marker>
  </defs>

  <!-- Main host -->
  <rect x="80" y="210" width="260" height="270" rx="22" fill="#1E293B" stroke="#38BDF8" stroke-width="2" filter="url(#shadow)"/>
  <text x="112" y="258" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">主 pi runtime</text>
  <text x="112" y="298" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">当前用户会话</text>
  <text x="112" y="330" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">当前工具调用</text>
  <text x="112" y="362" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="17">当前 working dir</text>
  <line x1="112" y1="392" x2="308" y2="392" stroke="#334155"/>
  <text x="112" y="430" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">registerTool("subagent")</text>

  <!-- Extension scheduler -->
  <rect x="430" y="176" width="330" height="338" rx="24" fill="#172554" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <text x="462" y="224" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">extension 调度器</text>
  <text x="462" y="264" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">1. discoverAgents()</text>
  <text x="462" y="298" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">2. 选择 single / chain / parallel</text>
  <text x="462" y="332" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">3. 组装 CLI 参数</text>
  <text x="462" y="366" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">4. 注入 prompt / tools / model</text>
  <text x="462" y="400" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">5. JSON mode 读取事件流</text>
  <line x1="462" y1="430" x2="728" y2="430" stroke="#334155"/>
  <text x="462" y="468" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">高级工作流长在 extension 层</text>

  <!-- Child runtimes -->
  <rect x="860" y="156" width="300" height="130" rx="20" fill="#2E1065" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <text x="892" y="202" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">子 pi 进程 A</text>
  <text x="892" y="238" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">--mode json · --no-session</text>
  <text x="892" y="264" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">agent-specific prompt</text>

  <rect x="860" y="326" width="300" height="130" rx="20" fill="#2E1065" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <text x="892" y="372" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">子 pi 进程 B</text>
  <text x="892" y="408" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">独立 context window</text>
  <text x="892" y="434" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">tool / model 可单独配置</text>

  <rect x="860" y="496" width="300" height="130" rx="20" fill="#2E1065" stroke="#A78BFA" stroke-width="2" filter="url(#shadow)"/>
  <text x="892" y="542" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">子 pi 进程 C</text>
  <text x="892" y="578" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">并行上限 / 并发控制</text>
  <text x="892" y="604" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="16">usage / cost 回传</text>

  <!-- arrows -->
  <path d="M340 345 C372 345 390 345 430 345" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="358" y="326" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="15">tool call</text>

  <path d="M760 292 C800 250 818 224 860 220" stroke="#A78BFA" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M760 345 C798 345 818 391 860 391" stroke="#A78BFA" stroke-width="4" marker-end="url(#arrow2)"/>
  <path d="M760 398 C800 448 818 554 860 561" stroke="#A78BFA" stroke-width="4" marker-end="url(#arrow2)"/>
  <text x="782" y="172" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="15">spawn(pi)</text>
  <text x="782" y="474" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="15">parallel / chain</text>

  <path d="M860 650 C705 694 510 680 340 493" stroke="#38BDF8" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="552" y="688" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="16">message_end / tool_result_end / usage → 主会话渲染</text>

  <!-- footer insight -->
  <rect x="120" y="590" width="610" height="64" rx="16" fill="#0F172A" stroke="#475569"/>
  <text x="152" y="630" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">核心判断：</text>
  <text x="264" y="630" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">pi 让多 agent orchestration 作为宿主能力长出来。</text>
</svg>
