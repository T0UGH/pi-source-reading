<svg width="1720" height="1100" viewBox="0 0 1720 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="1020" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E172A"/>
      <stop offset="1" stop-color="#09111F"/>
    </linearGradient>
    <linearGradient id="leftCard" x1="168" y1="242" x2="690" y2="888" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18324A"/>
      <stop offset="1" stop-color="#102338"/>
    </linearGradient>
    <linearGradient id="rightCard" x1="910" y1="242" x2="1432" y2="888" gradientUnits="userSpaceOnUse">
      <stop stop-color="#113A36"/>
      <stop offset="1" stop-color="#0B2A27"/>
    </linearGradient>
    <filter id="shadow" x="120" y="190" width="1360" height="740" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1720" height="1100" fill="url(#bg)"/>
  <circle cx="202" cy="124" r="220" fill="#1C3C61" fill-opacity="0.18"/>
  <circle cx="1440" cy="986" r="260" fill="#165D55" fill-opacity="0.16"/>

  <text x="120" y="122" fill="#F8FAFC" font-size="48" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-weight="700">Claude Code vs pi：成品 agent 与可编程宿主</text>
  <text x="120" y="170" fill="#94A3B8" font-size="22" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-weight="500">区别不在功能多少，而在高级工作流更倾向长在 core，还是长在 runtime surface。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="220" width="620" height="650" rx="28" fill="url(#leftCard)" stroke="#3B82F6" stroke-opacity="0.4"/>
    <rect x="860" y="220" width="620" height="650" rx="28" fill="url(#rightCard)" stroke="#34D399" stroke-opacity="0.45"/>
  </g>

  <text x="168" y="294" fill="#DBEAFE" font-size="38" font-family="'SF Pro Display', 'PingFang SC', sans-serif" font-weight="700">Claude Code</text>
  <text x="908" y="294" fill="#D1FAE5" font-size="38" font-family="'SF Pro Display', 'PingFang SC', sans-serif" font-weight="700">pi</text>

  <text x="168" y="332" fill="#93C5FD" font-size="21" font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-weight="600">强成品 agent / 内建工作流优先</text>
  <text x="908" y="332" fill="#86EFAC" font-size="21" font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-weight="600">可编程宿主 / runtime surface 优先</text>

  <line x1="800" y1="236" x2="800" y2="856" stroke="#334155" stroke-width="2" stroke-dasharray="10 12"/>

  <g font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif">
    <text x="168" y="406" fill="#CBD5E1" font-size="20" font-weight="700">产品定位</text>
    <text x="908" y="406" fill="#CBD5E1" font-size="20" font-weight="700">产品定位</text>
    <text x="168" y="444" fill="#F8FAFC" font-size="26" font-weight="600">官方做强的 agent 成品</text>
    <text x="908" y="444" fill="#F8FAFC" font-size="26" font-weight="600">可长工作流的宿主</text>

    <text x="168" y="522" fill="#CBD5E1" font-size="20" font-weight="700">高级工作流位置</text>
    <text x="908" y="522" fill="#CBD5E1" font-size="20" font-weight="700">高级工作流位置</text>
    <text x="168" y="560" fill="#F8FAFC" font-size="26" font-weight="600">优先内建进 core</text>
    <text x="908" y="560" fill="#F8FAFC" font-size="26" font-weight="600">优先外化到 runtime surface</text>

    <text x="168" y="638" fill="#CBD5E1" font-size="20" font-weight="700">plan</text>
    <text x="908" y="638" fill="#CBD5E1" font-size="20" font-weight="700">plan</text>
    <text x="168" y="676" fill="#F8FAFC" font-size="26" font-weight="600">更像内建 workflow</text>
    <text x="908" y="676" fill="#F8FAFC" font-size="26" font-weight="600">更像 mode switch</text>

    <text x="168" y="754" fill="#CBD5E1" font-size="20" font-weight="700">subagent</text>
    <text x="908" y="754" fill="#CBD5E1" font-size="20" font-weight="700">subagent</text>
    <text x="168" y="792" fill="#F8FAFC" font-size="26" font-weight="600">官方 fork path</text>
    <text x="908" y="792" fill="#F8FAFC" font-size="24" font-weight="600">extension 委派 runtime</text>

    <text x="168" y="870" fill="#CBD5E1" font-size="20" font-weight="700">用户价值</text>
    <text x="908" y="870" fill="#CBD5E1" font-size="20" font-weight="700">用户价值</text>
    <text x="168" y="908" fill="#F8FAFC" font-size="26" font-weight="600">直接使用强产品</text>
    <text x="908" y="908" fill="#F8FAFC" font-size="26" font-weight="600">在宿主上长工作流</text>
  </g>

  <rect x="120" y="954" width="1480" height="88" rx="20" fill="#0F172A" stroke="#475569" stroke-opacity="0.45"/>
  <text x="160" y="1008" fill="#E2E8F0" font-size="24" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-weight="600">结论：关键差异不在功能表，而在高级工作流是优先内建进产品，还是长在宿主 runtime surface。</text>
</svg>
