<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" rx="32" fill="#0B1020"/>
  <rect x="40" y="40" width="1200" height="560" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="96" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">这不是另一个 Claude Code：pi 小书阅读地图</text>
  <text x="80" y="132" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">这本书不做功能大全，只沿一条线读：pi 如何把 agent 做成可编程宿主。</text>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10 Z" fill="#38BDF8"/></marker>
  </defs>

  <rect x="88" y="214" width="238" height="170" rx="22" fill="#3B1625" stroke="#F472B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="116" y="260" fill="#FCE7F3" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">先排除误读</text>
  <text x="116" y="302" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="17">不是命令大全</text>
  <text x="116" y="332" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="17">不是 provider 大全</text>
  <text x="116" y="362" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="17">不是 TUI 教程</text>

  <rect x="396" y="180" width="250" height="238" rx="24" fill="#172554" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <text x="424" y="228" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">核心问题</text>
  <text x="424" y="270" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">pi 和 cc 最大差异？</text>
  <text x="424" y="304" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">真正卖点是什么？</text>
  <text x="424" y="338" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">为什么系统型用户值得看？</text>
  <text x="424" y="382" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">强成品 vs 可编程宿主</text>

  <rect x="720" y="168" width="408" height="270" rx="26" fill="#052E16" stroke="#34D399" stroke-width="2" filter="url(#shadow)"/>
  <text x="752" y="216" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">阅读顺序</text>
  <text x="752" y="258" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">01 定位：pi 是可编程宿主</text>
  <text x="752" y="290" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">02 底座：session tree 是 runtime state</text>
  <text x="752" y="322" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">03 委派：subagent 是独立 runtime</text>
  <text x="752" y="354" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">04 模式：plan mode 是 mode switch</text>
  <text x="752" y="386" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">05/06 收口：宿主平台与产品路线</text>

  <path d="M326 300 C356 300 366 300 396 300" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M646 300 C676 300 690 300 720 300" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="168" y="504" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">入口判断：pi 值得单独研究，不是因为功能更多，而是因为它把高级工作流应该长在哪里这件事重新打开了。</text>
</svg>
