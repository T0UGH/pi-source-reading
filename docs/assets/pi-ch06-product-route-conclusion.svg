<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="620" rx="32" fill="#0B1020"/>
  <rect x="40" y="40" width="1200" height="540" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="96" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">为什么 pi 代表另一种 agent 产品路线</text>
  <text x="80" y="132" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">不是功能表竞争，而是“官方强成品”与“可编程宿主”的路线分叉。</text>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10 Z" fill="#38BDF8"/></marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10 Z" fill="#34D399"/></marker>
  </defs>

  <rect x="92" y="206" width="318" height="220" rx="24" fill="#3B1625" stroke="#F472B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="124" y="252" fill="#FCE7F3" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">强成品 agent 路线</text>
  <text x="124" y="296" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="17">官方定义主流程</text>
  <text x="124" y="328" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="17">高级能力优先内建</text>
  <text x="124" y="360" fill="#FBCFE8" font-family="Inter, Arial, sans-serif" font-size="17">用户少操心，路径更固定</text>
  <text x="124" y="396" fill="#F9A8D4" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">适合：开箱即用、官方流程优先</text>

  <rect x="482" y="174" width="318" height="284" rx="28" fill="#172554" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <text x="514" y="222" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">pi 的可编程宿主路线</text>
  <text x="514" y="266" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">session tree 保存 runtime state</text>
  <text x="514" y="300" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">subagent 长在 extension 层</text>
  <text x="514" y="334" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">plan mode 是 mode switch</text>
  <text x="514" y="368" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="17">provider / compaction 可外化</text>
  <text x="514" y="406" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">价值：让工作流继续生长</text>

  <rect x="890" y="206" width="300" height="220" rx="24" fill="#052E16" stroke="#34D399" stroke-width="2" filter="url(#shadow)"/>
  <text x="922" y="252" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">适合的用户</text>
  <text x="922" y="296" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">会搭 agent 工作台</text>
  <text x="922" y="328" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">需要接内部系统</text>
  <text x="922" y="360" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="17">愿意治理权限与流程</text>
  <text x="922" y="396" fill="#86EFAC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">不是更省心，而是更可塑</text>

  <path d="M410 316 C438 316 454 316 482 316" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="426" y="294" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="15">路线分叉</text>
  <path d="M800 316 C838 316 856 316 890 316" stroke="#34D399" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="820" y="294" fill="#86EFAC" font-family="Inter, Arial, sans-serif" font-size="15">谁最受益</text>

  <rect x="168" y="452" width="900" height="48" rx="16" fill="#0F172A" stroke="#475569"/>
  <text x="200" y="483" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">一句话收束：</text>
  <text x="330" y="483" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="19">pi 不是要赢在功能最多，而是把 agent 做成可继续生长的宿主。</text>
</svg>
